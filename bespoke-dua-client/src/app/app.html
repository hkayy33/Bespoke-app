<div class="app">
  <app-nav-bar (myDuaClicked)="onMyDuaClicked()" (authClicked)="onAuthClicked()"></app-nav-bar>

  <main class="app-main">
    <router-outlet />
  </main>

  @if (authService.showAuthPage()) {
    <app-auth-page></app-auth-page>
  }

  @if (showSavedDuasModal()) {
    <app-saved-duas-modal (close)="closeSavedDuasModal()"></app-saved-duas-modal>
  }
</div>
