<div class="nav-container">
  <div class="nav-top">
    <div class="nav-spacer"></div>

    <div class="nav-left">
      <div class="brand">
        <a routerLink="/" aria-label="Go to home page">
          <img src="/hands.png" alt="Hands making dua" />
        </a>
      </div>

      <p class="quote">
        "I am as My servant thinks I am…"
        <span>[Hadith Qudsi]</span>
      </p>
    </div>

    <div class="action-buttons">
      <button class="my-dua-btn" (click)="handleMyDuaClick()" *ngIf="authService.user()">
        <i class="fa-solid fa-bookmark"></i>
        <span>My Heart's Dua</span>
      </button>

      <div class="user-section" *ngIf="authService.user()">
        <button
          class="user-icon"
          (click)="toggleDropdown()">
          <i class="fas fa-user-circle"></i>
        </button>
      </div>

      <div class="auth-section" *ngIf="!authService.user()">
        <button class="auth-btn" (click)="showAuthPage()">Login / Register</button>
      </div>
    </div>
  </div>
</div>
