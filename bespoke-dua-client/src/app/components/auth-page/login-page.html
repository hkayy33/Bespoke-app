<section class="form-panel">
  <h2>Login</h2>

  <form [formGroup]="form" (ngSubmit)="login()" novalidate>
    <div class="field-group">
      <label class="field-label" for="login-email">Email</label>
      <input
        id="login-email"
        type="email"
        formControlName="email"
        autocomplete="email"
        [class.input-has-error]="showFieldError(form.controls.email)"
        class="input-control"
      />
      @if (emailError(); as msg) {
        <p class="field-error" role="alert">
          <span class="field-error__icon" aria-hidden="true">!</span>
          <span>{{ msg }}</span>
        </p>
      }
    </div>

    <div class="field-group">
      <label class="field-label" for="login-password">Password</label>
      <input
        id="login-password"
        type="password"
        formControlName="password"
        autocomplete="current-password"
        [class.input-has-error]="showFieldError(form.controls.password)"
        class="input-control"
      />
      @if (passwordError(); as msg) {
        <p class="field-error" role="alert">
          <span class="field-error__icon" aria-hidden="true">!</span>
          <span>{{ msg }}</span>
        </p>
      }
    </div>

    <button type="submit" [disabled]="authService.loading()">Login</button>
  </form>

  @if (successMessage) {
    <div class="form-alert form-alert--success" role="status" aria-live="polite">
      <span class="form-alert__icon" aria-hidden="true">&#10003;</span>
      <div class="form-alert__body">{{ successMessage }}</div>
    </div>
  }

  @if (serverErrorText(); as err) {
    <div class="form-alert form-alert--error" role="alert" aria-live="assertive">
      <span class="form-alert__icon" aria-hidden="true">!</span>
      <div class="form-alert__body">{{ err }}</div>
    </div>
  }
</section>
