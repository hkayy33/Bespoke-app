<div class="container">
  @if (duaService.loading()) {
    <p>Generating your personalised duas...</p>
  } @else if (duaService.duas().length > 0) {
    <app-dua-result-card *ngFor="let dua of duaService.duas()" [dua]="dua"></app-dua-result-card>
  } @else {
    <p class="placeholder">Type your dua above and click the button above to generate personalised variations.</p>
  }
</div>
