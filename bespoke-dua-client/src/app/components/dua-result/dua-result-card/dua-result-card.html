<div class="dua-card">

    <div class="dua-header" *ngIf="infoButtonSelected">
        <p class="name">{{ dua.name }}</p>
        <button class="exit-btn" (click)="infoButtonSelected = false">
            <i class="fa-solid fa-x"></i>
        </button>
    </div>

    <p class="dua-text">
        {{ infoButtonSelected ? dua.explanation : dua.duaText }}
    </p>

    <div class="action-buttons">
        <button class="info-btn" (click)="infoButtonSelected = true">
            <i class="fa-regular fa-lightbulb"></i>
        </button>

        <button class="copy-btn" (click)="copyToClipboard(dua.duaText)">
            <i class="fa-regular fa-copy"></i>
            <span>{{copied ? "Copied!" : "Copy"}}</span>
        </button>
    </div>

</div>
