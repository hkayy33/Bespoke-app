<div class="container">
    <div class="dua-container">
        <div class="exit-btn" *ngIf="infoButtonSelected" (click)="infoButtonSelected = !infoButtonSelected">
            <i class="fa-solid fa-x"></i>
        </div>
        <p *ngIf="infoButtonSelected" class="name">{{dua.name}}</p>
        <p>{{ infoButtonSelected  ? dua.explanation : dua.duaText}}</p>
    </div>
    <div class="action-buttons">
        <button class="info-btn" (click)="infoButtonSelected = true"><i class="fa-regular fa-lightbulb"></i> </button>
        <button class="copy-btn"><i class="fa-regular fa-copy"></i> <span class="copy-text"> Copy</span> </button>
    </div>
</div>
