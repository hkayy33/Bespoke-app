<div class="dua-card">

    @if (showAimModal()) {
        <div class="modal-backdrop" (click)="showAimModal.set(false)">
            <div class="modal-content" (click)="$event.stopPropagation()">
                <button type="button" class="modal-close" (click)="showAimModal.set(false)" aria-label="Close">
                    <i class="fa-solid fa-x"></i>
                </button>
                @for (exp of dua.explanations; track $index) {
                    <div class="dua-header">
                        <p class="name">{{ exp.name }}</p>
                        <p class="dua-text">{{ exp.explanation }}</p>
                    </div>
                }
            </div>
        </div>
    }

        <p class="dua-text">
            {{dua.duaText }}
        </p>

        <div class="action-buttons">
            <button type="button" class="info-btn" (click)="showAimModal.set(true)">
                <i class="fa-regular fa-lightbulb"></i>
            </button>

             <button type="button" class="saved-btn" >
                <i class="fa-regular fa-bookmark"></i>
            </button>

            <button class="copy-btn" (click)="copyToClipboard(dua.duaText)">
                <i class="fa-regular fa-copy"></i>
                <span>{{copied ? "Copied!" : "Copy"}}</span>
            </button>
        </div>
    </div>
